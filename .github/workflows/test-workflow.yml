name: Test workflow

on:
  pull_request_target:
    branches:
      - "**"

permissions:
  contents: write  # Allows pushing files, creating commits, etc.
  pull-requests: write  # Optional: if you also want to comment on PRs

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Test workflow 1
        run: |
          whoami

      - name: Sleep
        run: |
          sleep 600
